# troop example configuration
# Copy to troop.toml and edit as needed

[server]
# Address and port to bind the web interface
bind = "0.0.0.0:8080"
# Optional admin password (leave empty to disable authentication)
admin_password = "changeme"

[storage]
# Directories for pending and completed tasks (relative to working directory)
todo_dir = "todo"
done_dir = "done"

# ── Accounts ─────────────────────────────────────────────────────────────────
# Each account is an input source that troop polls for incoming commands.

# IMAP account example
[[accounts]]
name = "main-email"
type = "imap"
host = "imap.example.com"
port = 993
username = "troop@example.com"
password = "secret"
tls = true
enabled = true
poll_interval_secs = 60

# SMTP settings for sending replies (optional)
# When smtp_host is set troop will email a reply to the sender after each command.
smtp_host = "smtp.example.com"
smtp_port = 465
smtp_username = "troop@example.com"
smtp_password = "secret"
smtp_tls = true          # true = implicit TLS (port 465), false = STARTTLS (port 587)
reply_from = "troop@example.com"   # optional, defaults to smtp_username

# POP3 account example (not yet implemented, shown for completeness)
# [[accounts]]
# name = "secondary-email"
# type = "pop3"
# host = "pop.example.com"
# port = 995
# username = "troop2@example.com"

# Telegram bot example (stub – integration ready for future use)
# [[accounts]]
# name = "tg-bot"
# type = "telegram"
# token = "123456:ABC-DEF..."
# enabled = false
# poll_interval_secs = 5

# ── Filters ──────────────────────────────────────────────────────────────────
# Filters guard which messages are allowed to submit commands.
# All fields are optional; if a filter has no fields it accepts everything.
# Multiple filters are OR-ed: a message passes if it satisfies ANY filter.
# Within a single filter all present fields must ALL match (AND logic).

# Accept any message from a trusted sender on the main-email account
[[filters]]
account = "main-email"
from_address = ["boss@example.com", "admin@example.com"]

# Accept messages that mention the magic word anywhere in the body
# [[filters]]
# body_contains = ["TROOP_SECRET"]

# Require a specific header (e.g. set by your mail server)
# [[filters]]
# header_checks = [{ name = "X-Troop-Auth", value = "mysecret" }]

# Require GPG-signed messages (gpg binary must be in PATH)
# [[filters]]
# gpg_required = true
